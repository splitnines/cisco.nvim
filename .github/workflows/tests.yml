name: Tests

on:
  push:
  pull_request:

jobs:
  neovim:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Neovim
        run: |
          sudo apt-get update
          sudo apt-get install -y neovim

      - name: Run test harness
        run: nvim --headless -u tests/minimal_init.lua "+lua require('tests.run').run()" "+qa"
